<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Recruiter Dashboard</title>
    <link rel="icon" type="image/png" sizes="32x32" href="icon.png">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        h1 {
            color: #38bdf8;
        }

        .section {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            background: #334155;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #38bdf8;
            color: black;
        }

        .delete {
            background: #ef4444;
            margin-top: 10px;
        }

        .delete:hover {
            background: #dc2626;
        }

        .card {
            padding: 10px;
            border-bottom: 1px solid #334155;
        }
    </style>
</head>

<body>

    <h1>📊 Panel Rekrutera</h1>

    <div class="section">
        <h2>🟦 Dashboard</h2>
        <p>Kandydaci: <span id="count">0</span></p>
        <p>Testy dziś: <span id="today">0</span></p>
    </div>

    <div class="section">
        <h2>🟨 Kandydaci</h2>
        <input id="search" placeholder="Szukaj kandydata..."
            style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none;">
        <div id="users"></div>
    </div>

    <div class="section">
        <h2>🟩 Profil kandydata</h2>
        <div id="profile">Kliknij kandydata</div>
    </div>

    

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, getDocs, collection, deleteDoc, doc }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_c5yD2XF-mbCK1NGLYMdIk7UVKGsLxoU",
            authDomain: "motorowodni-49c56.firebaseapp.com",
            projectId: "motorowodni-49c56"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allData = [];

        async function load() {

            const snap = await getDocs(collection(db, "wyniki"));
            document.getElementById("search").addEventListener("input", renderUsers);

            allData = [];

            snap.forEach(docSnap => {
                let d = docSnap.data();

                allData.push({
                    id: docSnap.id,
                    ...d
                });
            });

            renderDashboard();
            renderUsers();
            renderStats();
        }

        function renderDashboard() {

            document.getElementById("count").innerText = allData.length;

            let today = new Date().toDateString();

            let todayCount = allData.filter(d => {
                if (!d.data) return false;
                return new Date(d.data.seconds * 1000).toDateString() === today;
            }).length;

            document.getElementById("today").innerText = todayCount;
        }

        function renderUsers() {

            let query = document.getElementById("search")?.value?.toLowerCase() || "";

            let html = "";

            allData
                .filter(u => u.gracz.toLowerCase().includes(query))
                .forEach((u, i) => {

                    let date = "";
                    if (u.data?.seconds) {
                        date = new Date(u.data.seconds * 1000).toLocaleString();
                    }

                    html += `
                        <div class="card">
                            <b>${u.gracz}</b><br>
                            <small>${date}</small><br><br>
                            <button onclick="showProfile(${i})">Profil</button>
                            <button class="delete" onclick="deleteUser(${i})">Usuń</button>
                        </div>
                    `;
                });

            document.getElementById("users").innerHTML = html;
        }

        window.showProfile = function (i) {

            let u = allData[i];

            let html = `<h3>${u.gracz}</h3>`;

            u.wybory.forEach((w, j) => {
                html += `<p>${j + 1}. ${w.pytanie}<br><b>${w.odpowiedz}</b></p>`;
            });

            document.getElementById("profile").innerHTML = html;
        }

        window.deleteUser = async function (i) {

            let u = allData[i];

            if (!confirm("Usunąć tego kandydata?")) return;

            await deleteDoc(doc(db, "wyniki", u.id));

            load();
        }

        function renderStats() {

            let stats = {};

            allData.forEach(user => {
                user.wybory.forEach(w => {

                    if (!stats[w.pytanie]) stats[w.pytanie] = {};
                    if (!stats[w.pytanie][w.odpowiedz]) stats[w.pytanie][w.odpowiedz] = 0;

                    stats[w.pytanie][w.odpowiedz]++;
                });
            });

            let html = "";

            for (let q in stats) {

                html += `<h4>${q}</h4>`;

                for (let a in stats[q]) {
                    html += `<p>${a} → ${stats[q][a]}x</p>`;
                }

                html += "<hr>";
            }

            document.getElementById("stats").innerHTML = html;
        }

        load();

    </script>

</body>

</html>

        body {
            margin: 0;
            background: linear-gradient(135deg, #0f172a, #020617);
            font-family: "Inter", Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            width: 100%;
            max-width: 720px;
            background: rgba(30, 41, 59, 0.9);
            border-radius: 16px;
            padding: 30px;
            color: white;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #38bdf8;
            letter-spacing: 1px;
        }

        h3 {
            margin-bottom: 20px;
            line-height: 1.4;
        }

        button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 10px;
            background: #334155;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:active {
            transform: scale(0.97);
        }

        button:hover {
            background: #38bdf8;
            color: #020617;
            transform: translateY(-2px);
        }

        .input-label {
            display: block;
            margin-bottom: 6px;
            color: #94a3b8;
            font-size: 13px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border: 1px solid #38bdf8;
            border-radius: 10px;
            padding: 12px;
            transition: 0.2s;
        }

        .input-wrapper:focus-within {
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.3);
            transform: scale(1.01);
        }

        .icon {
            margin-right: 8px;
            color: #0f172a;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #38bdf8;
            margin-bottom: 15px;
            background: #f8fafc;
            color: #0f172a;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        input::placeholder {
            color: #94a3b8;
        }

        .error {
            margin-top: 6px;
            font-size: 12px;
            color: #f87171;
            min-height: 16px;
        }

        input:focus {
            outline: none;
            border: 1px solid #0ea5e9;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.3);
            transform: scale(1.01);
        }

        .bar {
            height: 18px;
            background: linear-gradient(90deg, #38bdf8, #0ea5e9);
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .progress {
            height: 6px;
            background: #1e293b;
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-inner {
            height: 100%;
            background: #38bdf8;
        }

        .fade {
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .end {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        .end-card {
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .check {
            width: 70px;
            height: 70px;
            margin: 0 auto 15px;
            border-radius: 50%;
            background: #38bdf8;
            color: #0f172a;
            font-size: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            animation: pop 0.4s ease;
        }

        @keyframes pop {
            0% {
                transform: scale(0);
            }

            80% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        .end h2 {
            margin: 10px 0;
            color: #38bdf8;
        }

        .end p {
            color: #cbd5e1;
            margin-bottom: 15px;
        }
    </style>
</head>

                "odp": [

                        "Zawsze",

        {

        let wybory = [];
        let poprawne = 0;
        let index = 0;
        let nick = "";

        // 🎲 shuffle
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 🧭 menu
        function menu() {
            appDiv.innerHTML = `
        <button onclick="start()">Start</button>
    `;
        }

        document.addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                const input = document.getElementById("nickInput");
                if (input) startQuiz();
            }
        });

        window.validateNick = function () {
            const input = document.getElementById("nickInput");
            const error = document.getElementById("nickError");
            const btn = document.getElementById("startBtn");

            if (!input) return;

            let value = input.value.trim();

            if (value.length < 3) {
                error.textContent = "Nick musi mieć min. 3 znaki";
                btn.disabled = true;
            }
            else if (value.length > 15) {
                error.textContent = "Nick za długi (max 15 znaków)";
                btn.disabled = true;
            }
            else {
                error.textContent = "OK ✓";
                error.style.color = "#34d399";
                btn.disabled = false;
            }
        }

        // ▶️ start
        window.start = function () {
            appDiv.innerHTML = `
        <div class="fade-in">
            <label class="input-label">Nick</label>

            <div class="input-wrapper">
                <span class="icon">👤</span>
                <input id="nickInput" placeholder="Nick" oninput="validateNick()">
            </div>

            <div id="nickError" class="error"></div>
        </div>

        <div class="fade-in" style="animation-delay:0.15s">
            <button id="startBtn" onclick="startQuiz()" disabled>Rozpocznij</button>
        </div>
    `;
        }

        // 🎮 quiz
        window.startQuiz = function () {
            nick = document.getElementById("nickInput").value.trim();

            if (nick.length < 3) {
                alert("Nick jest za krótki!");
                return;
            }

            shuffle(pytania);
            index = 0;
            wybory = [];
            poprawne = 0;
            pytania.forEach(p => { p.odpowiedziLosowe = [...p.odp].map((x,i)=>({tekst:x, idx:i})); shuffle(p.odpowiedziLosowe); });
            pokazPytanie();
        }

        function pokazPytanie() {

            // 🚨 KONIEC QUIZU
            if (index >= pytania.length) {

                appDiv.innerHTML = `
            <div class="progress">
                <div class="progress-inner" style="width:100%"></div>
            </div>

            <h2 class="fade" style="text-align:center;">
                Dziękuję za odpowiedzi!
            </h2>
        `;

                zapiszWybor();
                return;
            }

            // 📌 aktualne pytanie
            let p = pytania[index];

            // 📊 progress (ILE JUŻ ZROBIONE)
            let progress = (index / pytania.length) * 100;

            // 🔀 mieszanie odpowiedzi
            let idx = p.odpowiedziLosowe;

            // 🎨 HTML pytania
            let html = `
        <div class="progress">
            <div class="progress-inner" style="width:${progress}%"></div>
        </div>

        <h2 class="fade">
            ${index + 1}/${pytania.length}<br>
            ${p.tresc}
        </h2>
    `;

            // 🟦 odpowiedzi
            idx.forEach((i) => {
                html += `
            <button class="fade" onclick="wybierz(${i.idx})">
                ${i.tekst}
            </button>
        `;
            });

            // 📤 render
            appDiv.innerHTML = html;
        }

        // 📌 wybór
        window.wybierz = function (i) {
            let p = pytania[index];

            const czyPoprawna = i === p.poprawna;
            if (czyPoprawna) poprawne++;

            wybory.push({
                NumerPytania: index + 1,
                pytanie: p.tresc,
                odpowiedz: p.odp[i],
                poprawna: p.odp[p.poprawna],
                wynik: czyPoprawna
            });

            index++;
            pokazPytanie();
        }

        // 💾 zapis do FIREBASE
        async function zapiszWybor() {
            try {

                await addDoc(collection(db, "wyniki"), {
                    gracz: nick,
                    wybory: wybory,
                    poprawne: poprawne,
                    procent: Math.round((poprawne / pytania.length) * 100),
                    data: new Date()
                });

                appDiv.innerHTML = `
            <h2 style="text-align:center;" class="fade">
                Twój wynik: ${poprawne}/${pytania.length}<br>
                Wynik procentowy: ${Math.round((poprawne / pytania.length) * 100)}%
            </h2>
        `;

            } catch (e) {
                console.log(e);
                alert("Błąd zapisu!");
            }
        }

        // init
        const appDiv = document.getElementById("app");
        menu();

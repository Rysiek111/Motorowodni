<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Panel Kontrolny</title>
    <link rel="icon" type="image/x-icon" href="icon.ico">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        h1 {
            color: #38bdf8;
        }

        .section {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            background: #334155;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #38bdf8;
            color: black;
        }

        .delete {
            background: #ef4444;
            margin-top: 10px;
        }

        .delete:hover {
            background: #dc2626;
        }

        .card {
            padding: 10px;
            border-bottom: 1px solid #334155;
        }

        /* Styl dla wyróżnienia wyników kandydata */
        .score-badge {
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
            margin-left: 5px;
            display: inline-block;
        }
    </style>
</head>

<body>

    <h1>📊 Panel Rekrutera</h1>

    <div class="section">
        <h2>🟦 Dashboard</h2>
        <p>Kandydaci: <span id="count">0</span></p>
        <p>Testy dziś: <span id="today">0</span></p>
    </div>

    <div class="section">
        <h2>🟨 Kandydaci</h2>
        <input id="search" placeholder="Szukaj kandydata..."
            style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none;">
        <div id="users"></div>
    </div>

    <div class="section">
        <h2>🟩 Profil kandydata</h2>
        <div id="profile">Kliknij kandydata</div>
    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, getDocs, collection, deleteDoc, doc }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_c5yD2XF-mbCK1NGLYMdIk7UVKGsLxoU",
            authDomain: "motorowodni-49c56.firebaseapp.com",
            projectId: "motorowodni-49c56"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allData = [];

        async function load() {
            const snap = await getDocs(collection(db, "wyniki"));
            
            document.getElementById("search").removeEventListener("input", renderUsers);
            document.getElementById("search").addEventListener("input", renderUsers);

            allData = [];

            snap.forEach(docSnap => {
                let d = docSnap.data();

                allData.push({
                    id: docSnap.id,
                    ...d
                });
            });

            renderDashboard();
            renderUsers();
        }

        function renderDashboard() {
            document.getElementById("count").innerText = allData.length;

            let today = new Date().toDateString();

            let todayCount = allData.filter(d => {
                if (!d.data) return false;
                return new Date(d.data.seconds * 1000).toDateString() === today;
            }).length;

            document.getElementById("today").innerText = todayCount;
        }

        function renderUsers() {
            let query = document.getElementById("search")?.value?.toLowerCase() || "";
            let html = "";

            allData
                .filter(u => u.gracz && u.gracz.toLowerCase().includes(query))
                .forEach((u) => {
                    let date = "";
                    if (u.data?.seconds) {
                        date = new Date(u.data.seconds * 1000).toLocaleString();
                    }

                    let wynikProcent = u.procent !== undefined ? u.procent + "%" : "-";
                    let wynikPoprawne = u.poprawne !== undefined ? u.poprawne : null;
                    let wyswietlanePoprawne = wynikPoprawne !== null ? wynikPoprawne : "-";

                    // --- DYNAMICZNY KOLOR NA BAZIE PUNTKÓW ---
                    let kolorBadge = "#64748b"; // Domyślny szary, gdy brak danych o punktach

                    if (wynikPoprawne !== null) {
                        if (wynikPoprawne >= 20) {
                            kolorBadge = "#10b981"; // Zielony od 20 punktów
                        } else {
                            kolorBadge = "#ef4444"; // Czerwony poniżej 20 punktów
                        }
                    }
                    // ----------------------------------------

                    html += `
                        <div class="card">
                            <b>${u.gracz}</b> 
                            <span class="score-badge" style="background-color: ${kolorBadge};">
                                ${wynikProcent} (${wyswietlanePoprawne} popr.)
                            </span><br>
                            <small>${date}</small><br><br>
                            <button onclick="showProfile('${u.id}')">Profil</button>
                            <button class="delete" onclick="deleteUser('${u.id}')">Usuń</button>
                        </div>
                    `;
                });

            document.getElementById("users").innerHTML = html;
        }

        window.showProfile = function (id) {
            let u = allData.find(user => user.id === id);
            if (!u) return;

            let wynikProcent = u.procent !== undefined ? u.procent + "%" : "-";
            let wynikPoprawne = u.poprawne !== undefined ? u.poprawne : "-";

            let html = `<h3>${u.gracz}</h3>`;
            html += `<p><b>Wynik ogólny:</b> ${wynikProcent} (Poprawne odpowiedzi: ${wynikPoprawne})</p><hr>`;

            if (u.wybory && Array.isArray(u.wybory)) {
                u.wybory.forEach((w, j) => {
                    let identyfikatorPytania = w.pytanie || (w.NumerPytania !== undefined ? `Pytanie nr ${w.NumerPytania}` : `Pytanie ${j + 1}`);
                    let tekstOdpowiedzi = w.odpowiedz || w.odpowiedzKandydata || "Brak odpowiedzi";

                    html += `<p>${j + 1}. ${identyfikatorPytania}<br><b>${tekstOdpowiedzi}</b></p>`;
                });
            } else {
                html += `<p>Brak szczegółowych odpowiedzi dla tego kandydata.</p>`;
            }

            document.getElementById("profile").innerHTML = html;
        }

        window.deleteUser = async function (id) {
            if (!confirm("Usunąć tego kandydata?")) return;

            try {
                await deleteDoc(doc(db, "wyniki", id));
                await load();
            } catch (error) {
                console.error("Błąd podczas usuwania użytkownika:", error);
                alert("Nie udało się usunąć kandydata.");
            }
        }

        load();

    </script>

</body>

</html>

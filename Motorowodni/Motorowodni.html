<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Egzamin Motorowodny</title>
    <link rel="icon" type="image/x-icon" href="icon.ico">

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #07111e, #0c1a2c); /* Głęboka, nocna toń oceanu */
            font-family: "Inter", Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            width: 100%;
            max-width: 720px;
            background: rgba(16, 29, 46, 0.95); /* Ciemny, elegancki kokpit */
            border: 1px solid rgba(56, 189, 248, 0.2); /* Delikatna, neonowa ramka */
            border-radius: 16px;
            padding: 30px;
            color: #e2e8f0; /* Jasnoszary tekst, idealny do czytania w ciemności */
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 0 0 40px rgba(56, 189, 248, 0.05);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #38bdf8; /* Turkusowy neon na głównym nagłówku */
            letter-spacing: 2px;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        h2 {
            font-size: 22px;
            line-height: 1.4;
            margin-bottom: 20px;
            color: #f1f5f9;
        }

        button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 10px;
            background: #152942; /* Ciemnoniebieski przycisk bazowy */
            color: #38bdf8; /* Tekst świecący na turkusowo */
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        button:disabled {
            background: #0b1524;
            color: #334155;
            border-color: rgba(51, 65, 85, 0.3);
            cursor: not-allowed;
            transform: none !important;
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:hover:not(:disabled) {
            background: #38bdf8; /* Podświetlenie przycisku */
            color: #07111e;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
            transform: translateY(-2px);
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #0b1524;
            border: 2px solid #1e293b;
            border-radius: 10px;
            padding: 4px 12px;
            transition: all 0.2s ease;
            margin-bottom: 5px;
        }

        .input-wrapper:focus-within {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }

        .icon {
            margin-right: 10px;
            font-size: 18px;
            user-select: none;
            filter: drop-shadow(0 0 2px rgba(56, 189, 248, 0.5));
        }

        input {
            width: 100%;
            border: none;
            background: transparent;
            color: #f1f5f9;
            font-size: 16px;
            padding: 10px 0;
            font-family: inherit;
        }

        input:focus {
            outline: none;
        }

        input::placeholder {
            color: #475569;
        }

        .error {
            margin-top: 6px;
            font-size: 13px;
            color: #f87171;
            min-height: 20px;
            font-weight: 500;
        }

        .progress {
            height: 6px;
            background: #0b1524;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-inner {
            height: 100%;
            background: linear-gradient(90deg, #0284c7, #38bdf8);
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.6);
            transition: width 0.3s ease;
        }

        .question-img {
            display: block;
            max-width: 180px;
            max-height: 180px;
            width: auto;
            height: auto;
            margin: 0 auto 20px auto;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fade {
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeInUp 0.5s ease both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>=== Egzamin Motorowodny ===</h1>
        <div id="app"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, addDoc, collection, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_c5yD2XF-mbCK1NGLYMdIk7UVKGsLxoU",
            authDomain: "motorowodni-49c56.firebaseapp.com",
            projectId: "motorowodni-49c56",
            storageBucket: "motorowodni-49c56.firebasestorage.app",
            messagingSenderId: "634414019790",
            appId: "1:634414019790:web:f7ad6c6fc8bc424337cc9f",
            measurementId: "G-9E6DFZ072J"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let pytania = [];
        let wybory = [];
        let poprawne = 0;
        let index = 0;
        let daneGracza = "";
        let wybranyZestaw = "";

        const dostepneZestawy = [
            //"ZESTAW_1aHL", 
            "ZESTAW_2aHL", 
            //"ZESTAW_3aHL"
        ];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function menu() {
            appDiv.innerHTML = `<button onclick="start()">Start</button>`;
        }

        document.addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                const btn = document.getElementById("startBtn");
                if (btn && !btn.disabled) startQuiz();
            }
        });

        window.validateNick = function () {
            const input = document.getElementById("nickInput");
            const error = document.getElementById("nickError");
            const btn = document.getElementById("startBtn");

            if (!input) return;
            let value = input.value.trim();

            if (value.length < 3) {
                error.textContent = "Wpisz poprawne Imię i Nazwisko (min. 3 znaki)";
                error.style.color = "#f87171";
                btn.disabled = true;
            } else {
                error.textContent = "OK ✓";
                error.style.color = "#4ade80"; /* Zielony akcent potwierdzenia poprawności nicku */
                btn.disabled = false;
            }
        }

        window.start = function () {
            appDiv.innerHTML = `
                <div class="fade-in">
                    <label class="input-label">Podaj Imię i Nazwisko kandydata</label>
                    <div class="input-wrapper">
                        <span class="icon">👤</span>
                        <input id="nickInput" placeholder="Wpisz swoje Imię i Nazwisko..." oninput="validateNick()" autocomplete="off">
                    </div>
                    <div id="nickError" class="error"></div>
                </div>
                <div class="fade-in" style="animation-delay:0.1s; margin-top: 15px;">
                    <button id="startBtn" onclick="startQuiz()" disabled>Rozpocznij Test</button>
                </div>
            `;
        }

        window.startQuiz = async function () {
            const input = document.getElementById("nickInput");
            daneGracza = input ? input.value.trim() : "";

            if (daneGracza.length < 3) return;

            const losowyIndeks = Math.floor(Math.random() * dostepneZestawy.length);
            wybranyZestaw = dostepneZestawy[losowyIndeks];

            try {
                appDiv.innerHTML = `<h2>Generowanie losowego arkusza egzaminacyjnego...</h2>`;
                const docRef = doc(db, "baza_pytan", wybranyZestaw);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    pytania = docSnap.data().pytanya || docSnap.data().pytania;
                } else {
                    alert("Wystąpił problem z konfiguracją arkuszy w bazie danych!");
                    menu();
                    return;
                }
            } catch (err) {
                console.error(err);
                alert("Błąd połączenia z bazą Firebase!");
                menu();
                return;
            }

            index = 0;
            wybory = [];
            poprawne = 0;

            shuffle(pytania);

            pytania.forEach(p => { 
                p.odpowiedziLosowe = [...p.odp].map((x, i) => ({ tekst: x, idx: i })); 
                shuffle(p.odpowiedziLosowe); 
            });
            pokazPytanie();
        }

        function pokazPytanie() {
            if (index >= pytania.length) {
                appDiv.innerHTML = `
                    <div class="progress">
                        <div class="progress-inner" style="width:100%"></div>
                    </div>
                    <h2 class="fade" style="text-align:center;">
                        Dziękuję za odpowiedzi! Trwa obliczanie wyniku...
                    </h2>
                `;
                zapiszWybor();
                return;
            }

            let p = pytania[index];
            let progress = (index / pytania.length) * 100;
            let idx = p.odpowiedziLosowe;

            let html = `
                <div class="progress">
                    <div class="progress-inner" style="width:${progress}%"></div>
                </div>
                <h2 class="fade">
                    Pytanie ${index + 1} z ${pytania.length}<br><br>
                    ${p.tresc}
                </h2>
            `;

            if (p.obrazek) {
                html += `<img src="${p.obrazek}" alt="Rysunek pomocniczy" class="question-img fade">`;
            }

            idx.forEach((i) => {
                html += `
                    <button class="fade" onclick="wybierz(${i.idx})">
                        ${i.tekst}
                    </button>
                `;
            });

            appDiv.innerHTML = html;
        }

        window.wybierz = function (i) {
            let p = pytania[index];
            const czyPoprawna = i === p.poprawna;
            if (czyPoprawna) poprawne++;

            wybory.push({
                NumerPytania: index + 1,
                pytanie: p.tresc,
                odpowiedz: p.odp[i],
                poprawna: p.odp[p.poprawna],
                wynik: czyPoprawna
            });

            index++;
            pokazPytanie();
        }

        async function zapiszWybor() {
            try {
                await addDoc(collection(db, "motorowodni"), {
                    gracz: daneGracza,
                    zestaw: wybranyZestaw, 
                    wybory: wybory,
                    poprawne: poprawne,
                    procent: Math.round((poprawne / pytania.length) * 100),
                    data: new Date()
                });

                let podsumowanieSzczegolowe = "";
                wybory.forEach((w) => {
                    /* Zastosowanie żywego zielonego koloru (#4ade80) dla poprawnych kafelków w podsumowaniu */
                    podsumowanieSzczegolowe += `
                        <div style="text-align: left; background: #0b1524; padding: 15px; border-radius: 8px; margin-bottom: 12px; border: 1px solid ${w.wynik ? 'rgba(74, 222, 128, 0.4)' : 'rgba(248, 113, 113, 0.4)'}; border-left: 5px solid ${w.wynik ? '#4ade80' : '#f87171'}">
                            <p style="margin: 0 0 8px 0; font-weight: bold; font-size: 15px; color: #f1f5f9;">Pytanie ${w.NumerPytania}: ${w.pytanie}</p>
                            <p style="margin: 4px 0; font-size: 14px; color: ${w.wynik ? '#4ade80' : '#f87171'}">
                                <strong>Twoja odpowiedź:</strong> ${w.odpowiedz} ${w.wynik ? '✓' : '✗'}
                            </p>
                            ${!w.wynik ? `<p style="margin: 4px 0; font-size: 14px; color: #4ade80"><strong>Poprawna odpowiedź:</strong> ${w.poprawna}</p>` : ''}
                        </div>
                    `;
                });

                let czyZdal = poprawne >= 65;
                let statusEgzaminu = czyZdal ? "<span style='color:#4ade80; text-shadow: 0 0 10px rgba(74, 222, 128, 0.4);'>ZALICZONY ✓</span>" : "<span style='color:#f87171;'>NIEZALICZONY ✗</span>";

                appDiv.innerHTML = `
                    <div style="text-align:center;" class="fade">
                        <h2>Egzamin zakończony!</h2>
                        <p style="font-size: 18px; color: #94a3b8;"><strong>${daneGracza}</strong></p>
                        <p style="font-size: 16px; color: #e2e8f0; margin-top:5px;">Wynik egzaminu: ${statusEgzaminu}</p>
                        <h2 style="color: #38bdf8; margin-top: 10px; margin-bottom: 25px; text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);">
                            Twój wynik: ${poprawne} / ${pytania.length}<br>
                            Procent: ${Math.round((poprawne / pytania.length) * 100)}%
                        </h2>
                        
                        <div style="max-height: 400px; overflow-y: auto; margin-bottom: 20px; padding-right: 5px;">
                            ${podsumowanieSzczegolowe}
                        </div>

                        <button onclick="start()" style="margin-top: 10px; max-width: 200px;">Rozwiąż ponownie</button>
                    </div>
                `;

                if(window.innerHeight < 800) {
                    document.body.style.height = "auto";
                    document.body.style.padding = "20px 0";
                }
            } catch (e) {
                console.error(e);
                alert("Błąd zapisu wyniku do bazy danych!");
            }
        }

        const appDiv = document.getElementById("app");
        menu();
    </script>
</body>

</html>

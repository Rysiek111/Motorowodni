<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Panel Administratora - Motorowodni</title>
    <link rel="icon" type="image/x-icon" href="icon.ico">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        h1 {
            color: #38bdf8;
        }

        .section {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            background: #334155;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #38bdf8;
            color: black;
        }

        .delete {
            background: #ef4444;
            margin-top: 10px;
        }

        .delete:hover {
            background: #dc2626;
        }

        .card {
            padding: 10px;
            border-bottom: 1px solid #334155;
        }

        .score-badge {
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
            margin-left: 5px;
            display: inline-block;
        }
    </style>
</head>

<body>

    <h1>📊 Analiza wyników - Patent Sternika Motorowodnego</h1>

    <div class="section">
        <h2>🟦 Dashboard</h2>
        <p>Kandydaci: <span id="count">0</span></p>
        <p>Testy dziś: <span id="today">0</span></p>
    </div>

    <div class="section">
        <h2>🟨 Lista Egzaminowanych</h2>
        <input id="search" placeholder="Szukaj kandydata..."
            style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none;">
        <div id="users"></div>
    </div>

    <div class="section">
        <h2>🟩 Profil kandydata</h2>
        <div id="profile">Kliknij kandydata, aby załadować szczegółowy arkusz odpowiedzi</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, getDocs, collection, deleteDoc, doc, getDoc }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_c5yD2XF-mbCK1NGLYMdIk7UVKGsLxoU",
            authDomain: "motorowodni-49c56.firebaseapp.com",
            projectId: "motorowodni-49c56",
            storageBucket: "motorowodni-49c56.firebasestorage.app",
            messagingSenderId: "634414019790",
            appId: "1:634414019790:web:f7ad6c6fc8bc424337cc9f",
            measurementId: "G-9E6DFZ072J"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allData = [];

        async function load() {
            const snap = await getDocs(collection(db, "motorowodni"));

            document.getElementById("search").removeEventListener("input", renderUsers);
            document.getElementById("search").addEventListener("input", renderUsers);

            allData = [];
            snap.forEach(docSnap => {
                let d = docSnap.data();
                allData.push({
                    id: docSnap.id,
                    ...d
                });
            });

            renderDashboard();
            renderUsers();
        }

        function renderDashboard() {
            document.getElementById("count").innerText = allData.length;
            let today = new Date().toDateString();

            let todayCount = allData.filter(d => {
                if (!d.data) return false;
                return new Date(d.data.seconds * 1000).toDateString() === today;
            }).length;

            document.getElementById("today").innerText = todayCount;
        }

        function renderUsers() {
            let query = document.getElementById("search")?.value?.toLowerCase() || "";
            let html = "";

            allData
                .filter(u => u.gracz && u.gracz.toLowerCase().includes(query))
                .forEach((u) => {
                    let date = "";
                    if (u.data?.seconds) {
                        date = new Date(u.data.seconds * 1000).toLocaleString();
                    }

                    let wynikProcent = u.procent !== undefined ? u.procent + "%" : "-";
                    let wynikPoprawne = u.poprawne !== undefined ? u.poprawne : null;
                    let wyswietlanePoprawne = wynikPoprawne !== null ? wynikPoprawne : "-";
                    let kodZestawu = u.zestaw;

                    // Próg zaliczenia: zielony od 65 poprawnych odpowiedzi na 75 pytań
                    let kolorBadge = "#64748b";
                    if (wynikPoprawne !== null) {
                        if (wynikPoprawne >= 65) {
                            kolorBadge = "#10b981";
                        } else {
                            kolorBadge = "#ef4444";
                        }
                    }

                    html += `
                        <div class="card">
                            <b>${u.gracz}</b> <span style="color:#94a3b8; font-size:0.9em;">(${kodZestawu})</span>
                            <span class="score-badge" style="background-color: ${kolorBadge};">
                                ${wynikProcent} (${wyswietlanePoprawne} popr.)
                            </span><br>
                            <small>${date}</small><br><br>
                            <button onclick="showProfile('${u.id}')">Profil</button>
                            <button class="delete" onclick="deleteUser('${u.id}')">Usuń</button>
                        </div>
                    `;
                });

            document.getElementById("users").innerHTML = html;
        }

        window.showProfile = async function (id) {
            let u = allData.find(user => user.id === id);
            if (!u) return;

            document.getElementById("profile").innerHTML = "<h3>⏳ Pobieranie odpowiedniego zestawu pytań z bazy...</h3>";

            let kodZestawu = u.zestaw;
            let pytaniaZestawu = [];

            try {
                const docRef = doc(db, "baza_pytan", kodZestawu);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    pytaniaZestawu = docSnap.data().pytania;
                }
            } catch (err) {
                console.error("Błąd ładowania struktury pytań:", err);
            }

            let wynikProcent = u.procent !== undefined ? u.procent + "%" : "-";
            let wynikPoprawne = u.poprawne !== undefined ? u.poprawne : "-";
            let statusEgzaminu = u.poprawne >= 65 ? "<b style='color:#4ade80;'>ZDAŁ ✓</b>" : "<b style='color:#f87171;'>NEGATYWNY ✗</b>";

            let html = `<h3>👤 Kandydat: ${u.gracz}</h3>`;
            html += `<p><b>Arkusz:</b> ${kodZestawu} | <b>Wynik końcowy:</b> ${statusEgzaminu}</p>`;
            html += `<p><b>Statystyki:</b> ${wynikProcent} (Poprawne: ${wynikPoprawne} / 75)</p><hr>`;

            if (u.wybory && Array.isArray(u.wybory)) {
                u.wybory.forEach((w, j) => {
                    let pytanieObj = null;
                    if (pytaniaZestawu.length > j) {
                        pytanieObj = pytaniaZestawu[j];
                    }

                    let trescPytania = w.pytanie || (pytanieObj ? pytanieObj.tresc : `Pytanie ${j + 1}`);
                    let odpowiedzKandydata = w.odpowiedz || "Brak odpowiedzi";

                    let kolorOdpowiedzi = "white";
                    let podpowiedzPrawidlowej = "";
                    let imgHtml = "";

                    if (pytanieObj) {
                        let tekstPoprawnejOdpowiedzi = pytanieObj.odp[pytanieObj.poprawna];
                        if (pytanieObj.obrazek) {
                            imgHtml = `<br><img src="${pytanieObj.obrazek}" style="max-width:140px; border-radius:6px; margin:8px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.4);">`;
                        }

                        if (odpowiedzKandydata === tekstPoprawnejOdpowiedzi) {
                            kolorOdpowiedzi = "#4ade80";
                        } else {
                            kolorOdpowiedzi = "#f87171";
                            podpowiedzPrawidlowej = ` <span style="color: #94a3b8; font-size: 0.9em;">(Poprawna: ${tekstPoprawnejOdpowiedzi})</span>`;
                        }
                    }

                    html += `
                        <div style="margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px dashed #334155;">
                            <p style="margin: 0 0 4px 0;">${j + 1}. <b>${trescPytania}</b>${imgHtml}</p>
                            <p style="margin: 0;">Odpowiedź: <span style="color: ${kolorOdpowiedzi}; font-weight: bold;">${odpowiedzKandydata}</span>${podpowiedzPrawidlowej}</p>
                        </div>
                    `;
                });
            } else {
                html += `<p>Brak szczegółowych odpowiedzi dla tego kandydata.</p>`;
            }

            document.getElementById("profile").innerHTML = html;
        }

        window.deleteUser = async function (id) {
            if (!confirm("Czy na pewno chcesz trwale usunąć wynik tego kandydata?")) return;

            try {
                await deleteDoc(doc(db, "motorowodni", id));
                await load();
            } catch (error) {
                console.error("Błąd podczas usuwania użytkownika:", error);
                alert("Nie udało się usunąć kandydata.");
            }
        }

        load();
    </script>
</body>

</html>
